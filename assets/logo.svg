<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020508;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#040a10;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="8" fill="url(#bgGrad)"/>

  <!-- Corner brackets -->
  <path d="M12,12 L12,20 M12,12 L20,12" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <path d="M388,12 L388,20 M388,12 L380,12" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <path d="M12,108 L12,100 M12,108 L20,108" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <path d="M388,108 L388,100 M388,108 L380,108" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>

  <!-- Icon: Hexagonal agent cluster -->
  <g transform="translate(56, 60)">
    <!-- Outer hex ring -->
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18"
      fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.2"/>
    <!-- Inner hex -->
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11"
      fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.35"/>
    <!-- 4 agent nodes -->
    <circle cx="0"   cy="-16" r="4" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
    <circle cx="14"  cy="8"   r="4" fill="#a78bfa" filter="url(#glow)" opacity="0.9"/>
    <circle cx="-14" cy="8"   r="4" fill="#34d399" filter="url(#glow)" opacity="0.9"/>
    <circle cx="0"   cy="0"   r="5" fill="url(#cyanGrad)" filter="url(#glow)"/>
    <!-- Connector lines -->
    <line x1="0" y1="-12" x2="0"   y2="-4"  stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="0" y1="4"   x2="10"  y2="10"  stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="0" y1="4"   x2="-10" y2="10"  stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Wordmark: RWAi -->
  <text x="108" y="68"
    font-family="'Courier New', Courier, monospace"
    font-size="44"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#cyanGrad)"
    filter="url(#glow)">RWAi</text>

  <!-- Tagline -->
  <text x="110" y="88"
    font-family="'Courier New', Courier, monospace"
    font-size="9"
    letter-spacing="3"
    fill="#00d4ff"
    fill-opacity="0.45">SOVEREIGN AI AGENTS · MANTLE NETWORK</text>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.04"/>
  <line x1="96" y1="0" x2="96" y2="120" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.08"/>
</svg>
