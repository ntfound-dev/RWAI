<!DOCTYPE html>
<html>
<head><title>Export RWAi Logo PNG</title></head>
<body style="background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;font-family:monospace;">

<svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="800" height="240">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020508;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#040a10;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="120" rx="8" fill="url(#bgGrad)"/>
  <path d="M12,12 L12,20 M12,12 L20,12" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <path d="M388,12 L388,20 M388,12 L380,12" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <path d="M12,108 L12,100 M12,108 L20,108" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <path d="M388,108 L388,100 M388,108 L380,108" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  <g transform="translate(56, 60)">
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.2"/>
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="0"   cy="-16" r="4" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
    <circle cx="14"  cy="8"   r="4" fill="#a78bfa" filter="url(#glow)" opacity="0.9"/>
    <circle cx="-14" cy="8"   r="4" fill="#34d399" filter="url(#glow)" opacity="0.9"/>
    <circle cx="0"   cy="0"   r="5" fill="url(#cyanGrad)" filter="url(#glow)"/>
    <line x1="0" y1="-12" x2="0"   y2="-4"  stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="0" y1="4"   x2="10"  y2="10"  stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="0" y1="4"   x2="-10" y2="10"  stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>
  <text x="108" y="68" font-family="'Courier New', Courier, monospace" font-size="44" font-weight="700" letter-spacing="-1" fill="url(#cyanGrad)" filter="url(#glow)">RWAi</text>
  <text x="110" y="88" font-family="'Courier New', Courier, monospace" font-size="9" letter-spacing="3" fill="#00d4ff" fill-opacity="0.45">SOVEREIGN AI AGENTS · MANTLE NETWORK</text>
  <line x1="0" y1="60" x2="400" y2="60" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.04"/>
  <line x1="96" y1="0" x2="96" y2="120" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.08"/>
</svg>

<canvas id="canvas" style="display:none"></canvas>

<button onclick="exportPNG(2)" style="background:#00d4ff;color:#020508;border:none;padding:12px 28px;font-family:monospace;font-size:13px;letter-spacing:0.15em;cursor:pointer;border-radius:4px;">
  DOWNLOAD PNG (800×240)
</button>
<button onclick="exportPNG(4)" style="background:transparent;color:#00d4ff;border:1px solid #00d4ff44;padding:12px 28px;font-family:monospace;font-size:13px;letter-spacing:0.15em;cursor:pointer;border-radius:4px;">
  DOWNLOAD PNG 2× (1600×480)
</button>

<script>
function exportPNG(scale) {
  const svg = document.getElementById('logo');
  const canvas = document.getElementById('canvas');
  const w = 400 * scale, h = 120 * scale;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `rwai-logo-${w}x${h}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}
</script>

</body>
</html>
